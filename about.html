    <script>
        gsap.registerPlugin(ScrollTrigger);
 
        gsap.utils.toArray('section').forEach((section, index) => {
     console.log(section, index);
 
     const wrapper = section.querySelector('.wrapper');
     if (!wrapper) return; // 确保有 .wrapper 才继续
 
     if (index % 2 === 1) {
         // 偶数索引：从左向右滑动
         const x = '-100%';
         const xEnd = (wrapper.scrollWidth - section.offsetWidth) * -1;
 
         gsap.fromTo(
             wrapper,
             { x },
             {
                 x: xEnd,
                 scrollTrigger: {
                     trigger: section,
                     scrub: 4,
                     duration: 10,
                 },
             }
         );
     } else {
         // 奇数索引：从右向左滑动
         const x = '100%';
         const xEnd = 0;
 
         gsap.fromTo(
             wrapper,
             { x },
             {
                 x: xEnd,
                 scrollTrigger: {
                     trigger: section,
                     scrub: 4,
                     duration: 10,
                 },
             }
         );
     }
 });
 
     </script>

    </script>
